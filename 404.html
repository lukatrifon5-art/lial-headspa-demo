<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Pagina nu a fost găsită — Lia L Head SPA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="icon" href="assets/images/logo.jpg">
<style>
  .notfound { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: var(--ink); padding: 24px; }
  .notfound-inner { max-width: 460px; }
  .notfound img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; margin: 0 auto 28px; box-shadow: 0 0 0 1px rgba(250,247,240,0.25); }
  .notfound .eyebrow { color: var(--gold-light); }
  .notfound h1 { font-size: clamp(2.4rem, 8vw, 3.4rem); color: var(--white); margin-bottom: 16px; }
  .notfound p { color: rgba(250,247,240,0.72); font-size: 1.02rem; margin-bottom: 34px; }
  .notfound-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<section class="notfound">
  <div class="notfound-inner">
    <img src="assets/images/logo.jpg" alt="Lia L Head SPA">
    <span class="eyebrow">404</span>
    <h1>Pagina nu există</h1>
    <p>Se pare că ai rătăcit drumul spre pagina asta. Hai să te ducem înapoi într-un loc liniștit.</p>
    <div class="notfound-actions">
      <a href="/" class="btn btn-gold">Înapoi acasă</a>
      <a href="/contact.html" class="btn btn-outline">Rezervă o ședință</a>
    </div>
  </div>
</section>

</body>
</html>
